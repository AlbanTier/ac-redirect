<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="5; url=ac://join/test:8888">
  <title>Rejoindre le serveur — Les Copains AC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #E8593C;
      --accent-dark: #b8391c;
      --white: #f5f0eb;
      --dark: #0d0d0d;
      --muted: rgba(245,240,235,0.45);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('https://www.motorsport-academy.fr/img/cms/Blog/course-auto.webp');
      background-size: cover;
      background-position: center 30%;
      filter: brightness(0.35) saturate(0.8);
      z-index: 0;
      transform: scale(1.05);
      animation: bgzoom 8s ease forwards;
    }

    @keyframes bgzoom {
      to { transform: scale(1); filter: brightness(0.28) saturate(0.7); }
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.6;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
    }

    .stripe {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      z-index: 10;
      transform-origin: left;
      animation: stripe 5s linear forwards;
    }

    @keyframes stripe {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    .content {
      position: relative;
      z-index: 5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 6vw 7vh;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 2px;
      margin-bottom: 24px;
      width: fit-content;
      opacity: 0;
      animation: fadeup 0.6s 0.3s ease forwards;
    }

    .tag::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 10vw, 110px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--white);
      opacity: 0;
      animation: fadeup 0.7s 0.5s ease forwards;
      margin-bottom: 20px;
    }

    h1 span { color: var(--accent); }

    .sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeup 0.7s 0.7s ease forwards;
      margin-bottom: 40px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeup 0.7s 0.9s ease forwards;
    }

    .btn-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 28px;
      border-radius: 3px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-main:hover { background: var(--accent-dark); transform: translateY(-1px); }

    .btn-main svg { width: 16px; height: 16px; }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      text-decoration: none;
      border: 1px solid rgba(245,240,235,0.2);
      padding: 13px 22px;
      border-radius: 3px;
      transition: border-color 0.2s, color 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-ghost:hover { border-color: rgba(245,240,235,0.5); color: var(--white); }

    .timer {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .timer span { color: var(--accent); font-weight: 500; }

    .corner {
      position: fixed;
      top: 36px;
      right: 5vw;
      z-index: 5;
      text-align: right;
      opacity: 0;
      animation: fadeup 0.7s 1.1s ease forwards;
    }

    .corner-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .corner-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--white);
    }

    @keyframes fadeup {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .content { padding: 0 6vw 8vh; }
      .btn-main, .btn-ghost { width: 100%; justify-content: center; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="noise"></div>
  <div class="vignette"></div>
  <div class="stripe"></div>

  <div class="corner">
    <div class="corner-label">Serveur privé</div>
    <div class="corner-name">Assetto Corsa</div>
  </div>

  <div class="content">
    <div class="tag">Serveur en ligne</div>
    <h1>Les<br><span>Copains</span></h1>
    <p class="sub">
      Prêt à rejoindre la session ? Clique sur le bouton ci-dessous,
      Content Manager s'ouvre automatiquement et te connecte au serveur.
    </p>
    <div class="actions">
      <a class="btn-main" href="ac://join/test:8888">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Rejoindre la session
      </a>
      <a class="btn-ghost" href="https://assettocorsa.net/assetto-corsa-competizione/" target="_blank">
        Installer Content Manager
      </a>
      <span class="timer">Redirection auto dans <span id="count">5</span>s</span>
    </div>
  </div>

  <script>
    let n = 5;
    const el = document.getElementById('count');
    const t = setInterval(() => {
      n--;
      el.textContent = n;
      if (n <= 0) {
        clearInterval(t);
        window.location.href = 'ac://join/test:8888';
      }
    }, 1000);
  </script>
</body>
</html>
